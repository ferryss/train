server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: member
          uri: http://localhost:8081
          predicates:
            - Path=/member/**

logging:
  level:
    com.szx.train: debug

szx:
  auth:
    exclude-paths:
      - /member/member/register
      - /member/member/code




