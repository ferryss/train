spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
        namespace: train
      config:
        enabled: false
    gateway:
      routes:
        - id: member
          uri: lb://member
          predicates:
            - Path=/member/**
        - id: business
          uri: lb://business
          predicates:
            - Path=/business/**
        - id: batch
          uri: lb://batch
          predicates:
            - Path=/batch/**
