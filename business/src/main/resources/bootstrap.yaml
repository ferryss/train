spring:
  application:
    name: business
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        file-extension: yaml
        server-addr: 192.168.100.128:8848
        namespace: train
      discovery:
        server-addr: 192.168.100.128:8848
        namespace: train
    sentinel:
      transport:
        port: 8719
        dashboard: 127.0.0.1:8090

# seata配置
seata:
  tx-service-group: train-group
  #seata注册中心
  registry:
    type: nacos
    nacos:
      server-addr: 192.168.100.128:8848
      application: seata-server
      group: SEATA_GROUP
      namespace: train
      username: nacos
      password: nacos
  #seata配置中心
  config:
    type: nacos
    nacos:
      server-addr: 192.168.100.128:8848
      data-id: seataServer.properties
      group: SEATA_GROUP
      namespace: train
      username: nacos
      password: nacos

